services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - proxy

  app:
    image: ghcr.io/niklucky/silo:main
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
      - minio
    networks:
      - proxy
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=silo_proxy
      - traefik.http.routers.silo.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.silo.entrypoints=websecure
      - traefik.http.routers.silo.tls.certresolver=letsencrypt
      - traefik.http.services.silo.loadbalancer.server.port=3001

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: silo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=silo_proxy
      # S3 API — needed for presigned upload URLs from clients
      - traefik.http.routers.minio-api.rule=Host(`s3.${DOMAIN}`)
      - traefik.http.routers.minio-api.entrypoints=websecure
      - traefik.http.routers.minio-api.tls.certresolver=letsencrypt
      - traefik.http.routers.minio-api.service=minio-api
      - traefik.http.services.minio-api.loadbalancer.server.port=9000
      # MinIO web console
      - traefik.http.routers.minio-console.rule=Host(`minio.${DOMAIN}`)
      - traefik.http.routers.minio-console.entrypoints=websecure
      - traefik.http.routers.minio-console.tls.certresolver=letsencrypt
      - traefik.http.routers.minio-console.service=minio-console
      - traefik.http.services.minio-console.loadbalancer.server.port=9001

networks:
  proxy:
  internal:
    internal: true  # db and minio are unreachable from outside Docker

volumes:
  letsencrypt:
  postgres_data:
  minio_data:
